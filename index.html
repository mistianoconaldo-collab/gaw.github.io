<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAW Inc. | Digital Architecture</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 40px 0;
        }

        header { text-align: center; margin-bottom: 60px; }
        .logo { width: 120px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; margin: 10px 0; }

        /* Responsive Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .card:hover { border-color: #555; transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #ccc; }

        /* Button Styling */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }

        footer { margin-top: auto; padding: 40px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="using.png" alt="GAW Logo" class="logo">
            <h1>GAW Inc.</h1>
            <p>The Ultimate Digital Authority</p>
        </header>

        <section class="grid">
            <div class="card">
                <h3>Immediate Chat</h3>
                <p>Direct line for consulting and real-time support.</p>
                <a href="#" class="btn">Launch WhatsApp</a>
            </div>
            <div class="card">
                <h3>Start Project</h3>
                <p>Formal inquiries for high-end digital design.</p>
                <a href="#" class="btn">Brief the Studio</a>
            </div>
            <div class="card">
                <h3>Partnership</h3>
                <p>Collaborate within the GAW ecosystem.</p>
                <a href="#" class="btn">Collaborate</a>
            </div>
        </section>
    </div>

    <footer>
        &copy; 2026 GAW Inc. • Accra
    </footer>

</body>
</html>
